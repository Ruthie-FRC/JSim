site_name: JSim
repo_url: https://github.com/Ruthie-FRC/JSim
repo_name: Ruthie-FRC/JSim
site_description: >-
  Professional documentation for the JSim FRC physics library.
site_author: Ruthie-FRC
edit_uri: edit/main/mkdocs/docs/

theme:
  name: material
 # logo: assets/logo.png
 # favicon: assets/logo.png
  font:
    text: Source Sans 3
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - announce.dismiss

nav:
  - Home: index.md
  - API Reference:
      - Overview: api/links.md
      - Class List: api/annotated.md
      - Class Index: api/classes.md
      - Class Hierarchy: api/hierarchy.md
      - Class Members: api/class_members.md
      - Class Member Functions: api/class_member_functions.md
      - Class Member Variables: api/class_member_variables.md
      - Class Member Typedefs: api/class_member_typedefs.md
      - Class Member Enums: api/class_member_enums.md
      - Namespace List: api/namespaces.md
      - Namespace Members: api/namespace_members.md
      - Namespace Member Functions: api/namespace_member_functions.md
      - Namespace Member Variables: api/namespace_member_variables.md
      - Namespace Member Typedefs: api/namespace_member_typedefs.md
      - Namespace Member Enums: api/namespace_member_enums.md
      - Functions: api/functions.md
      - Variables: api/variables.md
      - Macros: api/macros.md
      - Files: api/files.md

plugins:
  - search
  - mkdoxy:
      projects:
        api:
          src-dirs: >-
            ../core/driver/include ../core/driver/src ../core/python
            ../vendordep/src/main/java ../jsim/java/api ../jsim/java/frc
            ../frc/robot/sim/core
          full-doc: true
          api-path: api
          doxy-cfg:
            FILE_PATTERNS: "*.h *.hpp *.cpp *.c *.java"
            RECURSIVE: true
            EXTRACT_ALL: true
            EXCLUDE_SYMBOLS: "operator[]"
            WARN_IF_UNDOCUMENTED: true
            WARN_NO_PARAMDOC: true
            JAVADOC_AUTOBRIEF: true
            GENERATE_TREEVIEW: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ruthie-FRC/JSim
      name: JSim on GitHub

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/external-links.js

markdown_extensions:
  - admonition
  - codehilite
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
