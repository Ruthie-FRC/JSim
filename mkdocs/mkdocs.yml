site_name: RenSim
repo_url: https://github.com/Ruthie-FRC/RenSim
repo_name: Ruthie-FRC/RenSim
site_description: >-
  Professional documentation for the RenSim FRC physics library.
site_author: Ruthie-FRC
edit_uri: edit/main/mkdocs/docs/

theme:
  name: material
 # logo: assets/logo.png
 # favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - announce.dismiss
    - header.autohide

nav:
  - Home: index.md
  - API Usage: api_usage.md
  - Architecture: architecture.md
  - Physics Reference: physics_reference.md
  - Math:
      - Overview: math_index.md
      - Units and Conventions: units_and_conventions.md
      - Integrators: integrators.md
      - Vector3: vector.md
      - Matrix3: matrix.md
      - Quaternion: quaternion.md
      - Aerodynamics Math: aerodynamics.md
      - Magnus Effect Math: magnus.md
      - Collision Impulses: collision_impulses.md
      - Drivetrain and Mechanism Dynamics: drivetrain_mechanism_dynamics.md

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - codehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
